name: Test Low-VRAM Image Generator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install diffusers>=0.28.0 transformers>=4.41.0 accelerate pillow
        pip install pytest
    
    - name: Smoke test
      run: |
        # Create a simple smoke test that doesn't require GPU
        cat > smoke_test.py << 'EOF'
        import torch
        from diffusers import StableDiffusionPipeline
        import sys
        
        def test_imports():
            """Test that all required packages can be imported"""
            import diffusers
            import transformers
            import accelerate
            import PIL
            print("All imports successful")
            return True
        
        def test_pipeline_creation():
            """Test that pipeline can be created in CPU mode"""
            # Use tiny model for testing
            pipe = StableDiffusionPipeline.from_pretrained(
                "hf-internal-testing/tiny-stable-diffusion-pipe",
                safety_checker=None,
                requires_safety_checker=False
            )
            print("Pipeline created successfully")
            return True
        
        if __name__ == "__main__":
            success = test_imports() and test_pipeline_creation()
            sys.exit(0 if success else 1)
        EOF
        
        # Run the smoke test
        python smoke_test.py
